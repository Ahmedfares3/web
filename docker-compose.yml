version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: affiliate-souk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: affiliate_souk_egypt
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - affiliate-network

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: affiliate-souk-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - affiliate-network

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: affiliate-souk-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres123@postgres:5432/affiliate_souk_egypt
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=your-nextauth-secret-here
      - JWT_SECRET=your-jwt-secret-here
    depends_on:
      - postgres
      - redis
    networks:
      - affiliate-network
    volumes:
      - ./uploads:/app/public/uploads

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: affiliate-souk-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - app
    networks:
      - affiliate-network

volumes:
  postgres_data:
  redis_data:

networks:
  affiliate-network:
    driver: bridge
